name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests on ${{ matrix.go-version }} ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22.x', '1.23.x']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang (Linux)
      # libc++ itself is not required: headers are vendored in
      # deps/include_libcxx/ and the runtime is statically merged into libv8.a.
      # We just need clang as the cgo compiler because -stdlib=libc++ is
      # clang-only.
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang
        echo "CC=clang" >> "$GITHUB_ENV"
        echo "CXX=clang++" >> "$GITHUB_ENV"

    - name: Install LLVM (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: choco install -y llvm

    - name: Set clang as cgo compiler (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        echo CC=clang.exe>>"%GITHUB_ENV%"
        echo CXX=clang++.exe>>"%GITHUB_ENV%"

    - name: Fetch prebuilt libv8
      run: go run scripts/fetch-libv8.go

    - name: Go Test
      env:
        CGO_CXXFLAGS: "-Werror -Wno-comment -Wno-vla-cxx-extension"
      run: go test -v -coverprofile c.out ./...

    - name: Upload coverage to Codecov
      if: runner.os != 'Windows'
      uses: codecov/codecov-action@v4
      env:
        OS: ${{ matrix.platform }}
        GO: ${{ matrix.go-version }}
      with:
        files: ./c.out
        env_vars: OS,GO

    - name: Add GOPATH to GITHUB_ENV
      if: runner.os != 'Windows'
      run: echo "GOPATH=$(go env GOPATH)" >>"$GITHUB_ENV"

    - name: Scan and upload FOSSA data (Linux/Mac)
      if: runner.os != 'Windows' && env.FOSSA_API_KEY != '' && github.ref == 'refs/heads/master'
      run: |
        curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install.sh | sudo bash
        fossa analyze
      env:
        FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
