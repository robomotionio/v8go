name: V8 Upgrade

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Run every day

jobs:
    upgrade:
        name: Upgrade V8
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: true
                  fetch-depth: 0
            - uses: actions/setup-python@v5
              with:
                python-version: '3.11'
            - name: Update depot_tools fetch config
              run: cd deps/depot_tools && git config --unset-all remote.origin.fetch; git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
              shell: bash
            - name: Add depot_tools to PATH
              run: echo "$PWD/deps/depot_tools" >> $GITHUB_PATH
              shell: bash
            - name: Run upgrade script
              run: cd deps && python upgrade_v8.py
            - name: Create PR metadata
              id: pr_metadata
              run: |
                version=$(cat deps/v8_version)
                {
                  echo "pr_branch=v8_upgrade/${version}"
                  echo "pr_commit_message=Upgrade V8 binaries for ${version} version"
                  echo "pr_body=Auto-generated pull request to upgrade V8 binary for ${version} version. After this PR is open, run the 'V8 Build' workflow on this branch to produce the six per-platform artifact PRs that must land on this branch before it merges to master."
                } >> "$GITHUB_OUTPUT"
            - name: Create PR
              uses: peter-evans/create-pull-request@v6
              with:
                commit-message: ${{steps.pr_metadata.outputs.pr_commit_message}}
                branch: ${{steps.pr_metadata.outputs.pr_branch}}
                delete-branch: true
                title: ${{steps.pr_metadata.outputs.pr_commit_message}}
                body: ${{steps.pr_metadata.outputs.pr_body}}
