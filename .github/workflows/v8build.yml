name: V8 Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach built artifacts to (e.g. v14.7.173.21)'
        required: true
      platforms:
        description: |
          Comma-separated targets to build, or "all". Names: linux_x86_64,
          linux_arm64, darwin_x86_64, darwin_arm64, windows_x86_64,
          windows_arm64. E.g. "darwin_x86_64,linux_arm64" rebuilds just
          those two; assets already on the release for other targets are
          left untouched (gh release upload --clobber replaces only matching
          asset names).
        required: false
        default: 'all'
  release:
    types: [published]

permissions:
  contents: write  # needed to upload release assets

jobs:
  # Tiny setup job that turns the `platforms` input (or the "build all" default
  # for release-publish triggers) into per-OS arch lists. Each downstream
  # build job consumes its OS's arch list as a dynamic matrix; if the list is
  # empty the job is skipped via `if:`. This is how we avoid spinning up
  # runners for platforms the user didn't ask to rebuild.
  setup:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.f.outputs.linux }}
      darwin: ${{ steps.f.outputs.darwin }}
      windows: ${{ steps.f.outputs.windows }}
    steps:
      - name: Compute matrix
        id: f
        env:
          PLATFORMS: ${{ github.event_name == 'release' && 'all' || github.event.inputs.platforms }}
        run: |
          set -euo pipefail
          if [ -z "$PLATFORMS" ] || [ "$PLATFORMS" = "all" ]; then
            PLATFORMS="linux_x86_64,linux_arm64,darwin_x86_64,darwin_arm64,windows_x86_64,windows_arm64"
          fi
          for os in linux darwin windows; do
            list=$(echo "$PLATFORMS" | tr ',' '\n' | sed -n "s/^${os}_//p" | jq -Rcn '[inputs]' || echo '[]')
            echo "${os}=${list}" | tee -a "$GITHUB_OUTPUT"
          done

  build-linux:
    needs: setup
    if: ${{ needs.setup.outputs.linux != '[]' }}
    name: Build V8 for linux ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.setup.outputs.linux) }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - name: Update depot_tools fetch config
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
        shell: bash
      - name: Install g++-aarch64-linux-gnu
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu
      - name: Build V8
        run: cd deps && ./build.py --arch ${{ matrix.arch }}
      - name: Stage artifact
        run: cp deps/linux_${{ matrix.arch }}/libv8.a libv8-linux-${{ matrix.arch }}.a
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" libv8-linux-${{ matrix.arch }}.a --clobber --repo "$GITHUB_REPOSITORY"

  build-darwin:
    needs: setup
    if: ${{ needs.setup.outputs.darwin != '[]' }}
    name: Build V8 for darwin ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.setup.outputs.darwin) }}
    # macos-15 = Apple Silicon (arm64), macos-15-large = native Intel x86_64.
    # We MUST build x86_64 on a native Intel runner: when the same arm64
    # macos-15 runner cross-compiles to x86_64, gn places the libc++.a target
    # archive at a path our find_target_archive glob doesn't match, so the
    # libc++ merge silently fails and produces a libv8.a with 0 __Cr symbols
    # (the bug that broke Mac-Intel deskbot links). Both runners ship Xcode
    # 16+ / MacOSX15.sdk which V8 14.x requires.
    runs-on: ${{ matrix.arch == 'arm64' && 'macos-15' || 'macos-15-large' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - name: Update depot_tools fetch config
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
        shell: bash
      - name: Build V8
        run: cd deps && ./build.py --arch ${{ matrix.arch }}
      - name: Stage artifact
        run: cp deps/darwin_${{ matrix.arch }}/libv8.a libv8-darwin-${{ matrix.arch }}.a
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" libv8-darwin-${{ matrix.arch }}.a --clobber --repo "$GITHUB_REPOSITORY"

  build-windows:
    needs: setup
    if: ${{ needs.setup.outputs.windows != '[]' }}
    name: Build V8 for windows ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.setup.outputs.windows) }}
    runs-on: windows-latest
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
      # Skip gclient's attempt to `git pull` depot_tools before sync. The
      # bootstrap step below modifies depot_tools files in-place, which
      # collides with gclient's "Updating depot_tools..." checkout.
      DEPOT_TOOLS_UPDATE: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - name: Update depot_tools fetch config
        shell: bash
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
      - name: Bootstrap depot_tools
        shell: cmd
        run: |
          cd deps\depot_tools
          call bootstrap\win_tools.bat
      # Cache the gn/ninja build dir. On cache hit ninja sees its outputs as
      # up-to-date and exits in seconds, so the post-ninja merge step in
      # build.py can be re-run without paying the 1.5h compile cost. Cache
      # writes happen even when the job fails, so a failure at the merge
      # step still preserves the build dir for the next iteration.
      # Bump the suffix to manually invalidate.
      - name: Cache V8 build dir
        uses: actions/cache@v4
        with:
          path: deps/.build/windows_${{ matrix.arch }}
          key: v8build-windows-${{ matrix.arch }}-${{ hashFiles('deps/v8_version') }}-v1
      - name: Build V8
        shell: cmd
        run: |
          cd deps
          python build.py --arch ${{ matrix.arch }}
      - name: Stage artifact
        shell: cmd
        run: copy deps\windows_${{ matrix.arch }}\libv8.lib libv8-windows-${{ matrix.arch }}.lib
      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" libv8-windows-${{ matrix.arch }}.lib --clobber --repo "$GITHUB_REPOSITORY"
