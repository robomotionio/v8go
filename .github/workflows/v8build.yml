name: V8 Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach built artifacts to (e.g. v14.7.173.21)'
        required: true
      platforms:
        description: |
          Comma-separated targets to build, or "all". Names: linux_x86_64,
          linux_arm64, darwin_x86_64, darwin_arm64, windows_x86_64,
          windows_arm64. E.g. "darwin_x86_64,linux_arm64" rebuilds just
          those two; assets already on the release for other targets are
          left untouched.
        required: false
        default: 'all'
  release:
    types: [published]

permissions:
  contents: write  # needed to upload release assets

# Used in each job's `if:` to skip the entire matrix entry when the user
# dispatches a partial rebuild. Release-publish triggers always build everything.
# `format(',{0},', X)` wraps with separators so `contains` matches whole
# tokens (linux_arm64 won't accidentally match against linux_arm64_extra).
env:
  PLATFORMS: ${{ github.event_name == 'release' && 'all' || github.event.inputs.platforms || 'all' }}

jobs:
  build-linux:
    name: Build V8 for linux ${{ matrix.arch }}
    if: ${{ github.event_name == 'release' || github.event.inputs.platforms == 'all' || github.event.inputs.platforms == '' || contains(format(',{0},', github.event.inputs.platforms), format(',linux_{0},', matrix.arch)) }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - name: Update depot_tools fetch config
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
        shell: bash
      - name: Install g++-aarch64-linux-gnu
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu
      - name: Build V8
        run: cd deps && ./build.py --arch ${{ matrix.arch }}
      - name: Stage artifact
        run: cp deps/linux_${{ matrix.arch }}/libv8.a libv8-linux-${{ matrix.arch }}.a
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" libv8-linux-${{ matrix.arch }}.a --clobber --repo "$GITHUB_REPOSITORY"

  build-darwin:
    name: Build V8 for darwin ${{ matrix.arch }}
    if: ${{ github.event_name == 'release' || github.event.inputs.platforms == 'all' || github.event.inputs.platforms == '' || contains(format(',{0},', github.event.inputs.platforms), format(',darwin_{0},', matrix.arch)) }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    # macos-15 ships Xcode 16+ with MacOSX15.sdk, which V8 14.x requires.
    # macos-14 (Xcode 15.x, SDK 14.5) fails gn gen with "No 15+ SDK found".
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - name: Update depot_tools fetch config
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
        shell: bash
      - name: Build V8
        run: cd deps && ./build.py --arch ${{ matrix.arch }}
      - name: Stage artifact
        run: cp deps/darwin_${{ matrix.arch }}/libv8.a libv8-darwin-${{ matrix.arch }}.a
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" libv8-darwin-${{ matrix.arch }}.a --clobber --repo "$GITHUB_REPOSITORY"

  build-windows:
    name: Build V8 for windows ${{ matrix.arch }}
    if: ${{ github.event_name == 'release' || github.event.inputs.platforms == 'all' || github.event.inputs.platforms == '' || contains(format(',{0},', github.event.inputs.platforms), format(',windows_{0},', matrix.arch)) }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    runs-on: windows-latest
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
      # Skip gclient's attempt to `git pull` depot_tools before sync. The
      # bootstrap step below modifies depot_tools files in-place, which
      # collides with gclient's "Updating depot_tools..." checkout.
      DEPOT_TOOLS_UPDATE: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - name: Update depot_tools fetch config
        shell: bash
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
      - name: Bootstrap depot_tools
        shell: cmd
        run: |
          cd deps\depot_tools
          call bootstrap\win_tools.bat
      - name: Build V8
        shell: cmd
        run: |
          cd deps
          python build.py --arch ${{ matrix.arch }}
      - name: Stage artifact
        shell: cmd
        run: copy deps\windows_${{ matrix.arch }}\v8_monolith.lib v8_monolith-windows-${{ matrix.arch }}.lib
      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" v8_monolith-windows-${{ matrix.arch }}.lib --clobber --repo "$GITHUB_REPOSITORY"
