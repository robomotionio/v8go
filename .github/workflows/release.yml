name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          # Link anchor in Keep-a-Changelog format: "## [v14.7.173.21] - 2026-04-24"
          # renders as #v147173213-2026-04-24 (GitHub strips periods in anchors).
          ANCHOR=$(echo "${TAG}---$(date +'%Y-%m-%d')" | sed -e 's/\.//g')
          CHANGELOG_URL="https://github.com/${GITHUB_REPOSITORY}/blob/master/CHANGELOG.md#${ANCHOR}"
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes "Full changelog: [${TAG}](${CHANGELOG_URL})

          Publishing this release will trigger \`.github/workflows/v8build.yml\`,
          which builds the prebuilt V8 static libraries for 6 target triples and
          uploads them as release assets."
